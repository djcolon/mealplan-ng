<!-- Top navigation bar: brand + collapsible nav menu -->
<nav class="navbar navbar-expand-md navbar-dark bg-success">
  <div class="container-fluid">

    <!-- Brand / app name shown in the banner -->
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" routerLink="/">
      <img src="logo.svg" alt="" aria-hidden="true" height="28" width="28">
      Meal Planner
    </a>

    <!-- Hamburger toggle for small screens -->
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainNav"
      aria-controls="mainNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Collapsible nav links; routerLinkActive adds Bootstrap's
         'active' class automatically when the route is active -->
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav me-auto mb-2 mb-md-0">
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/plan"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: false }"
          >
            Plan
          </a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/meals"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: false }"
          >
            Meals
          </a>
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/ingredients"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: false }"
          >
            Ingredients
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link disabled" aria-disabled="true">
            Shopping List
          </a>
        </li>
      </ul>
    </div>

  </div>
</nav>

<!-- Main content area: router-outlet renders child route views here -->
<main class="container-fluid py-4">
  <router-outlet />
</main>
